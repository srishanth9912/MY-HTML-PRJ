<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Monthly Expense Tracker - Track your expenses by month">
<meta name="keywords" content="expense tracker, monthly expenses, budget">
<title>Monthly Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Monthly Expense Tracker</h1>
<nav>
<a href="index.html">Home</a>
<a href="monthwise.html">Monthwise</a>
<a href="analytics.html">Analytics</a>
<a href="about.html">About</a>
</nav>
</header>

<main>

<section class="filter-section">
<h2>Select Month & Year</h2>

<form id="monthFilter">

<div class="form-group">
<label for="monthYear">Choose Month:</label>
<input type="month" id="monthYear" aria-label="Select month and year" aria-required="true">
</div>

<button type="submit" aria-label="Filter expenses by month">Filter</button>
<button type="button" id="resetMonth" aria-label="Reset month filter">Reset</button>

</form>

</section>

<section class="summary">
<h2>Monthly Summary</h2>
<p>Total Expenses for <span id="selectedMonth">This Month</span>: ₹ <span id="monthTotal">0</span></p>
</section>

<section class="table-section">

<h2>Expenses for <span id="tableMonth">Current Month</span></h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Amount</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>

<tbody id="monthExpenseTable">

</tbody>

</table>

</section>

<section class="empty-state" id="emptyStateMonth">
<p>No expenses found for this month</p>
</section>

<section class="chart-section">
</section>

</main>

<footer>
<p>&copy; 2026 Daily Expense Tracker</p>
</footer>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  initializeMonthwise();
});

function initializeMonthwise() {
  const today = new Date();
  const monthInput = document.getElementById('monthYear');
  monthInput.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
  displayMonthlyExpenses();
}

document.getElementById('monthFilter').addEventListener('submit', function(e) {
  e.preventDefault();
  displayMonthlyExpenses();
});

document.getElementById('resetMonth').addEventListener('click', function() {
  const today = new Date();
  const monthInput = document.getElementById('monthYear');
  monthInput.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
  displayMonthlyExpenses();
});

function displayMonthlyExpenses() {
  try {
    const monthValue = document.getElementById('monthYear').value;
    const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    
    const filteredExpenses = expenses.filter(expense => {
      return expense.date.startsWith(monthValue);
    });

    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                       'July', 'August', 'September', 'October', 'November', 'December'];
    const [year, month] = monthValue.split('-');
    const monthName = monthNames[parseInt(month) - 1];
    
    document.getElementById('selectedMonth').textContent = monthName + ' ' + year;
    document.getElementById('tableMonth').textContent = monthName + ' ' + year;

    const table = document.getElementById('monthExpenseTable');
    table.innerHTML = '';

    let total = 0;

    if (filteredExpenses.length === 0) {
      document.getElementById('emptyStateMonth').style.display = 'block';
      document.querySelector('.table-section').style.display = 'none';
      document.querySelector('.chart-section').style.display = 'none';
      return;
    }

    document.getElementById('emptyStateMonth').style.display = 'none';
    document.querySelector('.table-section').style.display = 'block';
    document.querySelector('.chart-section').style.display = 'block';

    filteredExpenses.forEach((expense, index) => {
      const row = document.createElement('tr');
      const formattedDate = formatDateToIndian(expense.date);
      row.innerHTML = `
        <td>${formattedDate}</td>
        <td>${expense.category}</td>
        <td>₹${parseFloat(expense.amount).toFixed(2)}</td>
        <td>${expense.note || '-'}</td>
        <td><button onclick="deleteMonthExpense('${expense.date}', '${expense.amount}')">Delete</button></td>
      `;
      table.appendChild(row);
      total += parseFloat(expense.amount);
    });

    document.getElementById('monthTotal').textContent = total.toFixed(2);

    displayMonthChart(filteredExpenses);

  } catch(error) {
    console.error('Error displaying monthly expenses:', error);
  }
}

function formatDateToIndian(dateString) {
  if(!dateString) return '';
  const [year, month, day] = dateString.split('-');
  return day + '-' + month + '-' + year;
}

function deleteMonthExpense(date, amount) {
  if(confirm('Are you sure you want to delete this expense?')) {
    try {
      let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
      expenses = expenses.filter(e => !(e.date === date && parseFloat(e.amount) === parseFloat(amount)));
      localStorage.setItem('expenses', JSON.stringify(expenses));
      displayMonthlyExpenses();
    } catch(error) {
      alert('Error deleting expense');
    }
  }
}

function displayMonthChart(expenses) {
  const categoryTotals = {};
  
  expenses.forEach(expense => {
    if(!categoryTotals[expense.category]) {
      categoryTotals[expense.category] = 0;
    }
    categoryTotals[expense.category] += parseFloat(expense.amount);
  });

  const chartDiv = document.getElementById('monthChart');
  chartDiv.innerHTML = '';

  const total = Object.values(categoryTotals).reduce((a, b) => a + b, 0);

  for(let category in categoryTotals) {
    const amount = categoryTotals[category];
    
    const bar = document.createElement('div');
    bar.style.marginBottom = '10px';
    
    chartDiv.appendChild(bar);
  }
}
</script>

</body>

</html>
